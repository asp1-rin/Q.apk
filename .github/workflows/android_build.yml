name: Android CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # SDK 도구 실행을 위해 JDK 17로 다시 상향
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup App Icon
      run: |
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        cp Q.PNG app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || echo "No Q.PNG found"

    # Android SDK 및 NDK 자동 설정
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: sdkmanager "ndk;25.2.9519653"

    # 빌드 도구 권한 부여
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Gradle 빌드 (버전 충돌을 피하기 위해 wrapper 사용)
    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ASP1RIN-ADMIN-DEBUG
        path: app/build/outputs/apk/debug/app-debug.apk