name: Android CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: sdkmanager "ndk;25.2.9519653"

    # --- 이제 실제 소스코드를 사용하므로, 강제 생성 단계는 주석 처리합니다 ---
    # - name: Restore Missing KittyMemory Files
    #   run: |
    #     mkdir -p app/src/main/cpp/KittyMemory
    #     echo -e '#ifndef KITTYMEMORY_H\n#define KITTYMEMORY_H\n#include <string>\nnamespace KittyMemory { std::string getVersion(); }\n#endif' > app/src/main/cpp/KittyMemory/KittyMemory.h
    #     echo -e '#include "KittyMemory.h"\nnamespace KittyMemory { std::string getVersion() { return "v1"; } }' > app/src/main/cpp/KittyMemory/KittyMemory.cpp
    #     echo "Files generated successfully:"
    #     ls -R app/src/main/cpp/KittyMemory/
    # -----------------------------------------------------------------

    - name: Setup Gradle 7.5 and Generate Wrapper
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: 7.5

    - name: Build with Gradle
      run: |
        # gradlew 생성 및 실행 권한 부여
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ASP1RIN-ADMIN-DEBUG
        path: app/build/outputs/apk/debug/app-debug.apk
