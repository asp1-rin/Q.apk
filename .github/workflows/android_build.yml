name: Android CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1 # 빌드 속도 향상을 위해 히스토리 제한

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: sdkmanager "ndk;25.2.9519653"

    - name: Setup Gradle 7.5
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: 7.5
        # 빌드 캐시 충돌 방지
        cache-read-only: false

    - name: Build with Gradle
      # 메모리 제한 옵션과 상세 로그 추가
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ASP1RIN-ADMIN-DEBUG
        path: app/build/outputs/apk/debug/app-debug.apk