name: Android CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    # 최상위 Q.PNG를 안드로이드 아이콘 규격으로 복사
    - name: Setup App Icon
      run: |
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        cp Q.PNG app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

    - name: Setup Android NDK
      uses: n0rtzh/setup-ndk@v1
      with:
        ndk-version: r25c

    # 빌드 스크립트 실행 권한 부여 및 빌드
    - name: Build with Gradle
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper
        fi
        chmod +x gradlew
        ./gradlew assembleDebug

    # 생성된 APK를 깃허브 웹사이트에 업로드
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: ASP1RIN-ADMIN-DEBUG
        path: app/build/outputs/apk/debug/app-debug.apk
