name: Android CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup App Icon
      run: |
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        cp Q.PNG app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || echo "No Q.PNG found"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: sdkmanager "ndk;25.2.9519653"

    # --- 서버의 Gradle을 무시하고 7.5 버전을 강제로 세팅 ---
    - name: Setup Gradle 7.5
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: 7.5

    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace # ./gradlew 대신 직접 gradle 호출
    # --------------------------------------------------

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ASP1RIN-ADMIN-DEBUG
        path: app/build/outputs/apk/debug/app-debug.apk
