name: Android CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 11 # Gradle 7.5에 최적화된 Java 11로 변경
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Setup App Icon
      run: |
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        cp Q.PNG app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || echo "No Q.PNG found"

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3
      
    - name: Install NDK
      run: sdkmanager "ndk;25.2.9519653"

    # 이 부분이 핵심입니다: 특정 Gradle 버전 강제 지정
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 7.5

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ASP1RIN-ADMIN-DEBUG
        path: app/build/outputs/apk/debug/app-debug.apk