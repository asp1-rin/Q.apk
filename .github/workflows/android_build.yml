name: Android Build CI

on:
  push:
    branches: [ "main" ] # 본인의 메인 브랜치 이름 (main 또는 master) 확인
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 코드 체크아웃 (v4로 업데이트)
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. JDK 설정 (v4로 업데이트)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Gradle 실행 권한 부여
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. APK 빌드 실행 (./gradlew assembleDebug)
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 5. 빌드된 APK 업로드 (v4로 업데이트)
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Q-Launcher-Debug
        # 빌드된 APK 경로 (프로젝트 구조에 따라 다를 수 있음)
        path: app/build/outputs/apk/debug/app-debug.apk
